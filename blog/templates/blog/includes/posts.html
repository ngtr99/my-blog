{% load static %}

{% block css_files %}
    <link rel="stylesheet" href="{% static 'posts.css' %}" />
{% endblock %}

<li>
    <article class="post">
        <div style="display:flex; gap:3 px; align-items:flex-start;">
            <a href="{% url 'post-detail' id=post.id %}" style="display:flex; gap:16px; align-items:flex-start; text-decoration:none; color:inherit; flex:1;">
                <div class="post_content" style="flex:1; font-size:18px;">
                    {% if post.image %}
                        <img src="{{ post.image.url }}" alt="{{ post.title }}" style="width:320px; max-width:35%; height:auto; object-fit:cover; border-radius:6px; flex-shrink:0;" />
                    {% endif %}
                    <h3 style="font-size:28px; margin:0 0 8px;">{{ post.title }}</h3>
                    <p style="font-size:16px; margin:0 0 8px;">{{ post.description }}</p>
                    <p style="font-size:14px; color:#666; margin:0 0 4px;">{{ post.date }}</p>
                    <p style="font-size:14px; color:#666; margin:0;">{{ post.location }}</p>
                </div>
            </a>
        </div>
    </article>
    <div class="post_actions" style="display:flex; flex-direction:column; gap:6px; margin-left:12px; align-self:flex-start;">
        <a href="{% url 'adjust-posts' id=post.id %}" style="display:inline-block; padding:4px 6px; font-size:12px; line-height:1; border-radius:3px; background:#eef; color:#0366d6; text-decoration:none;">Edit</a>
        <a href="{% url 'delete-posts' id=post.id %}" style="display:inline-block; padding:4px 6px; font-size:12px; line-height:1; border-radius:3px; background:#fff0f0; color:#c00; text-decoration:none; border:1px solid #f3cfcf;">Delete</a>
    </div>
</li>
