{% load static %}

{% block css_files %}
    <link rel="stylesheet" href="{% static 'posts.css' %}" />
{% endblock %}

<li>
    <article class="post">
        <a href="{% url 'post-detail-page' slug=post.slug %}">
            <img src="{% static 'images/'|add:post.image_name %}" alt="{{ post.title }}" />
            <div class="post_content">
                <h3>{{ post.title }}</h3>
                <p>{{ post.content }}</p>
            </div>
        </a>
    </article>
</li>
