{% extends "base.html" %}


{% load static %}

{% block title %}
    All My Posts
{% endblock  %}

{% block css_files %}
    <link rel="stylesheet" href="{% static "posts.css" %}" />  
    <link rel="stylesheet" href="{% static "all-posts.css" %}" />
{% endblock  %}

{% block content %}


<section>
    <h2><a href="{% url "index"%}"> My Posts </a></h2>
    
    <ul>
        {% for post in posts %}
            {% include "blog/includes/posts.html" %}
        {% endfor %}
    </ul>

    <a href="{% url 'add-posts' %}" class="fab" aria-label="Add new post" style="position: fixed; right: 24px; bottom: 24px; width: 56px; height: 56px; border-radius: 50%; background:#007bff; color:#fff; display:flex; align-items:center; justify-content:center; text-decoration:none; box-shadow:0 4px 8px rgba(0,0,0,0.3); font-size:28px;">
        +
    </a>

</section>
{% endblock  %}
